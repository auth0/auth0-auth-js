name: Runtime Compatibility (Deno)

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:

  test_core:
    name: auth0-auth-js
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          package-manager-cache: false

      - name: Update npm
        run: npm install -g npm@latest

      - name: Install dependencies
        run: npm install

      - name: Build
        run: npm run build -w @auth0/auth0-auth-js

      - name: Test
        run: deno run --allow-all ../../node_modules/vitest/vitest.mjs run
        working-directory: packages/auth0-auth-js


  test:
    name: ${{ matrix.package }}
    runs-on: ubuntu-latest
    needs: test_core
    strategy:
      matrix:
        package: [auth0-server-js, auth0-api-js]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          package-manager-cache: false

      - name: Update npm
        run: npm install -g npm@latest

      - name: Install dependencies
        run: npm install

      - name: Build
        run: npm run build -w @auth0/auth0-auth-js

      - name: Build
        run: npm run build -w @auth0/${{ matrix.package }}

      - name: Test
        run: deno run --allow-all ../../node_modules/vitest/vitest.mjs run
        working-directory: packages/${{ matrix.package }}